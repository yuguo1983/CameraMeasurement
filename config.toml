# 3DME Configuration
# UVC双目同步同帧摄像头 3840x1080 (左侧1920x1080 + 右侧1920x1080)

[camera]
resolution = [3840, 1080]
baseline_mm = 60.0
focal_length_px = 1200.0
principal_point = [1920.0, 540.0]
exposure_time_ms = 20
gain = 1.0

[camera.distortion]
k1 = 0.0
k2 = 0.0
p1 = 0.0
p2 = 0.0
k3 = 0.0

[stereo]
algorithm = "block_match"
block_size = 9
max_disparity = 128
min_disparity = 0
uniqueness = 0.8
speckle_window_size = 100
speckle_range = 2

[reconstruct]
depth_min_mm = 100.0
depth_max_mm = 5000.0
median_filter = true
downsampling = 1